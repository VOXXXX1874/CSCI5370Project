# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
dtype: bfloat16
attn_implementation: flash_attention_2

# Training data arguments
dataset_name: data/ReinforcementLearning/final_data/rlvr_student

# Algorithm arguments
loss_type: "dapo"
epsilon_high: 0.28
mask_truncated_completions: true
dynamic_sampling_scale: 1
overlong_filter_scale: 1
multi_objective_aggregation: normalize_then_sum

# reward config
reward_funcs: ['bleu', 'rouge_n', 'rouge_l', 'rouge_s', 'distinct_n']
reward_weights: [1.0, 0.3, 0.3, 0.3, 1.0]

# vllm config
vllm_mode: colocate
vllm_tensor_parallel_size: 1
temperature: 0.7
bf16: true
use_vllm: true
vllm_gpu_memory_utilization: 0.55
max_completion_length: 2048

# eval config
do_eval: true
eval_strategy: "steps"
eval_steps: 40
num_generations_eval: 1
quick_eval_dataset: data/ReinforcementLearning/final_data/rlvr_student
quick_eval_dataset_size: 600

# gradient checkpoint and lr
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-07
lr_scheduler_type: constant

# Batch config
gradient_accumulation_steps: 8
num_generations: 16
num_iterations: 4 
num_train_epochs: 1
per_device_eval_batch_size: 150
per_device_train_batch_size: 2

# saving
output_dir: output/Qwen2.5-1.5B/QC-student-GDPO-1.5B
push_to_hub: False
#save_strategy: "steps"
#save_steps: 400
save_strategy: "best"
metric_for_best_model: "rewards/mean"
greater_is_better: True
save_only_model: True
save_total_limit: 1

# logging
report_to:
- wandb
log_completions: False
log_level: info
logging_steps: 1
logging_strategy: steps
seed: 42
silence: true
num_completions_to_print: 24

# liger kernel
use_liger_kernel: false
