# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: data/InstructionTuning/final_data/instruction_tuning_all_v1
remove_unused_columns: false

# SFT trainer config
bf16: true
do_eval: true
eval_strategy: 'steps'
eval_steps: 30
eval_on_start: true
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-06
log_level: info
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
packing: false
max_length: 8192
max_steps: -1
num_train_epochs: 10
output_dir: output/Qwen2.5-1.5B/Qcen2.5-1.5B
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
push_to_hub: False
report_to:
- wandb
save_strategy: "steps"
save_steps: 30
save_total_limit: 1
save_only_model: true
seed: 42
use_liger_kernel: true
warmup_ratio: 0.05

